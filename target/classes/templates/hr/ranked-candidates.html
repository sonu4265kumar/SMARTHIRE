<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SmartHire - Ranked Candidates</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- Navigation Bar -->
<nav>
    <a href="/hr/dashboard" class="nav-brand">SmartHire</a>
    <div class="nav-links">
        <a th:href="@{/hr/dashboard}">Dashboard</a>
        <a th:href="@{/hr/post-job}">Post Job</a>
        <a th:href="@{/hr/view-jobs}">View Jobs</a>
        <a th:href="@{/logout}" class="logout">Logout</a>
    </div>
</nav>

<div class="container">

    <div class="page-title">Ranked Candidates</div>

    <!-- Job Details Card -->
    <div class="card" style="margin-bottom: 24px;">
        <div class="form-row">
            <div>
                <p style="font-size:13px; color:#777;">Job Title</p>
                <p style="font-weight:bold; font-size:16px;"
                   th:text="${job.title}">
                </p>
            </div>
            <div>
                <p style="font-size:13px; color:#777;">Required Skills</p>
                <p style="font-weight:bold; font-size:16px;"
                   th:text="${job.requiredSkills}">
                </p>
            </div>
            <div>
                <p style="font-size:13px; color:#777;">Total Vacancies</p>
                <p style="font-weight:bold; font-size:16px;"
                   th:text="${job.vacancies}">
                </p>
            </div>
            <div>
                <p style="font-size:13px; color:#777;">Total Applicants</p>
                <p style="font-weight:bold; font-size:16px;"
                   th:text="${#lists.size(applications)}">
                </p>
            </div>
        </div>
    </div>

    <!-- Back Button -->
    <div style="margin-bottom: 16px;">
        <a th:href="@{/hr/view-jobs}" class="btn btn-primary btn-sm">
            Back to Jobs
        </a>
    </div>

    <!-- No applications message -->
    <div th:if="${#lists.isEmpty(applications)}"
         class="card"
         style="text-align:center; padding:40px; color:#777;">
        No applications received for this job yet.
    </div>

    <!-- Ranked Candidates Table -->
    <div class="table-container"
         th:if="${!#lists.isEmpty(applications)}">
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Student Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>College</th>
                    <th>Degree</th>
                    <th>ATS Score</th>
                    <th>Matched Skills</th>
                    <th>Missing Skills</th>
                    <th>Applied Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="app, stat : ${applications}">

                    <!-- Rank number -->
                    <td>
                        <!-- Show medal for top 3 -->
                        <span th:if="${stat.index == 0}">🥇</span>
                        <span th:if="${stat.index == 1}">🥈</span>
                        <span th:if="${stat.index == 2}">🥉</span>
                        <span th:if="${stat.index > 2}"
                              th:text="${stat.index + 1}">
                        </span>
                    </td>

                    <!-- Student details -->
                    <td><strong th:text="${app.student.name}"></strong></td>
                    <td th:text="${app.student.email}"></td>
                    <td th:text="${app.student.phone}"></td>
                    <td th:text="${app.student.college}"></td>
                    <td th:text="${app.student.degree}"></td>

                    <!-- ATS Score with color -->
                    <td>
                        <strong
                            th:classappend="${app.atsScore >= 75} ? 'score-excellent' :
                                           (${app.atsScore >= 50} ? 'score-good' :
                                           (${app.atsScore >= 25} ? 'score-average' :
                                           'score-low'))"
                            th:text="${app.atsScore} + '%'">
                        </strong>
                    </td>

                    <!-- Matched skills - green tags -->
                    <td>
                        <div class="skill-tags">
                            <span th:each="skill :
                                  ${#strings.arraySplit(app.matchedSkills, ',')}"
                                  class="skill-tag skill-matched"
                                  th:text="${skill}">
                            </span>
                        </div>
                    </td>

                    <!-- Missing skills - red tags -->
                    <td>
                        <div class="skill-tags">
                            <span th:each="skill :
                                  ${#strings.arraySplit(app.missingSkills, ',')}"
                                  class="skill-tag skill-missing"
                                  th:text="${skill}">
                            </span>
                        </div>
                    </td>

                    <td th:text="${app.appliedDate}"></td>

                    <!-- Status Badge -->
                    <td>
                        <span class="badge"
                              th:classappend="${app.status == 'APPLIED'}     ? 'badge-applied' :
                                             (${app.status == 'SHORTLISTED'} ? 'badge-shortlisted' :
                                             (${app.status == 'SELECTED'}    ? 'badge-selected' :
                                             'badge-rejected'))"
                              th:text="${app.status}">
                        </span>
                    </td>

                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
