<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SmartHire - Register</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card" style="max-width: 500px;">

        <!-- Website Name -->
        <h2>Create Account</h2>

        <!-- Error message -->
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <!-- Tab buttons to select registration type -->
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="showTab('student', this)">
                Register as Student
            </button>
            <button class="tab-btn" onclick="showTab('hr', this)">
                Register as HR
            </button>
        </div>

        <!-- ========================
             STUDENT REGISTRATION FORM
             ======================== -->
        <div id="student-form">
            <form th:action="@{/register}" method="post">

                <!-- Hidden role field -->
                <input type="hidden" name="role" value="STUDENT"/>

                <!-- Personal Details -->
                <p style="font-weight:bold; color:#2c3e50;
                           margin-bottom:12px;">
                    Personal Details
                </p>

                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text"
                               name="name"
                               placeholder="Enter full name"
                               required/>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text"
                               name="phone"
                               placeholder="Enter phone number"/>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email"
                           name="email"
                           placeholder="Enter your email"
                           required/>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password"
                           name="password"
                           placeholder="Create a password"
                           required/>
                </div>

                <!-- Education Details -->
                <p style="font-weight:bold; color:#2c3e50;
                           margin-top:16px; margin-bottom:12px;">
                    Education Details
                </p>

                <div class="form-group">
                    <label>College / University Name</label>
                    <input type="text"
                           name="college"
                           placeholder="e.g. Punjab University"
                           required/>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Degree</label>
                        <select name="degree">
                            <option value="">Select Degree</option>
                            <option value="B.Tech">B.Tech</option>
                            <option value="BCA">BCA</option>
                            <option value="MCA">MCA</option>
                            <option value="M.Tech">M.Tech</option>
                            <option value="BCS">BCS</option>
                            <option value="BSc IT">BSc IT</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Passing Year</label>
                        <select name="passingYear">
                            <option value="">Select Year</option>
                            <option value="2024">2024</option>
                            <option value="2025">2025</option>
                            <option value="2026">2026</option>
                            <option value="2027">2027</option>
                            <option value="2028">2028</option>
                            <option value="2029">2029</option>
                            <option value="2030">2030</option>
                            <option value="2031">2031</option>
                            
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Skills (comma separated)</label>
                    <input type="text"
                           name="skills"
                           placeholder="e.g. java, python, mysql, html"/>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    Register as Student
                </button>

            </form>
        </div>

        <!-- ========================
             HR REGISTRATION FORM
             ======================== -->
        <div id="hr-form" style="display: none;">
            <form th:action="@{/register}" method="post">

                <!-- Hidden role field -->
                <input type="hidden" name="role" value="HR"/>

                <!-- Personal Details -->
                <p style="font-weight:bold; color:#2c3e50;
                           margin-bottom:12px;">
                    Personal Details
                </p>

                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text"
                               name="name"
                               placeholder="Enter your name"
                               required/>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text"
                               name="phone"
                               placeholder="Enter phone number"/>
                    </div>
                </div>

                <div class="form-group">
                    <label>Company Email</label>
                    <input type="email"
                           name="email"
                           placeholder="Enter company email"
                           required/>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password"
                           name="password"
                           placeholder="Create a password"
                           required/>
                </div>

                <!-- Company Details -->
                <p style="font-weight:bold; color:#2c3e50;
                           margin-top:16px; margin-bottom:12px;">
                    Company Details
                </p>

                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text"
                           name="company"
                           placeholder="e.g. Infosys, TCS, Wipro"
                           required/>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Your Designation</label>
                        <input type="text"
                               name="designation"
                               placeholder="e.g. HR Manager"/>
                    </div>
                    <div class="form-group">
                        <label>Company Location</label>
                        <input type="text"
                               name="companyLocation"
                               placeholder="e.g. Delhi, Mumbai"/>
                    </div>
                </div>

                <div class="form-group">
                    <label>Company Website</label>
                    <input type="text"
                           name="companyWebsite"
                           placeholder="e.g. www.infosys.com"/>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    Register as HR
                </button>

            </form>
        </div>

        <!-- Login link -->
        <div class="auth-footer">
            Already have account?
            <a th:href="@{/login}">Login here</a>
        </div>

    </div>
</div>

<!-- Tab switching logic -->
<script>
    function showTab(tab, el) {

        // Hide both forms
        document.getElementById('student-form').style.display = 'none';
        document.getElementById('hr-form').style.display = 'none';

        // Remove active from all tab buttons
        document.querySelectorAll('.tab-btn')
            .forEach(btn => btn.classList.remove('active'));

        // Show selected form
        document.getElementById(tab + '-form').style.display = 'block';

        // Set clicked button as active
        el.classList.add('active');
    }
</script>

</body>
</html>
